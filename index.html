<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Big Calculator</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to right, #5f9cff, #6dd5ed);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.calculator {
  background: #1e1e2f;
  padding: 25px;
  border-radius: 15px;
  width: 340px; /* bigger width */
  box-shadow: 0 10px 25px rgba(0,0,0,0.35);
}

#screen {
  width: 100%;
  height: 65px;
  margin-bottom: 15px;
  font-size: 26px;
  text-align: right;
  border: none;
  border-radius: 8px;
  padding: 10px;
  background: #f4f4f4;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

button {
  height: 65px;
  border: none;
  border-radius: 8px;
  font-size: 18px;
  cursor: pointer;
  background: #2d2d44;
  color: white;
  transition: 0.2s;
}

button:hover {
  background: #44446a;
}

.operator {
  background: #ff9f43;
}

.equal {
  background: #28c76f;
}

.clear {
  background: #ea5455;
}

.wide {
  grid-column: span 2;
}
</style>
</head>

<body>

<div class="calculator">
  <input type="text" id="screen" disabled>

  <div class="buttons">
    <button class="clear" onclick="clearScreen()">C</button>
    <button onclick="press('(')">(</button>
    <button onclick="press(')')">)</button>
    <button class="operator" onclick="press('/')">÷</button>

    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>
    <button class="operator" onclick="press('*')">×</button>

    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>
    <button class="operator" onclick="press('-')">−</button>

    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>
    <button class="operator" onclick="press('+')">+</button>

    <button class="wide" onclick="press('0')">0</button>
    <button onclick="press('.')">.</button>
    <button class="equal" onclick="calculate()">=</button>
  </div>
</div>

<script>
let screen = document.getElementById("screen");

function press(val) {
  screen.value += val;
}

function calculate() {
  try {
    screen.value = eval(screen.value);
  } catch {
    screen.value = "Error";
  }
}

function clearScreen() {
  screen.value = "";
}
</script>

</body>
</html>
